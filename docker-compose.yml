version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jobhub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobhub
      POSTGRES_PASSWORD: jobhub
      POSTGRES_DB: jobhub
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
